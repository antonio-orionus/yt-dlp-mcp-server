name: publish

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  npm:
    name: publish npm package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout MCP server
        uses: actions/checkout@v6
        with:
          path: yt-dlp-mcp-server

      - name: Checkout bridge
        uses: actions/checkout@v6
        with:
          repository: antonio-orionus/yt-dlp-bridge
          path: y/yt-dlp-bridge

      - name: Checkout ytdlp-errors
        uses: actions/checkout@v6
        with:
          repository: antonio-orionus/yt-dlp-errors
          path: y/ytdlp-errors

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.1
          run_install: false

      - name: Install pinned yt-dlp for bridge drift check
        run: python -m pip install "yt-dlp==2026.03.17"

      - name: Install
        working-directory: yt-dlp-mcp-server
        run: pnpm install --frozen-lockfile

      - name: Validate release gate
        working-directory: yt-dlp-mcp-server
        run: pnpm run validate:release

      - name: Check release version
        working-directory: yt-dlp-mcp-server
        run: |
          package_version="$(node -p "require('./package.json').version")"
          expected_tag="v${package_version}"

          if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match package version ${package_version}; expected ${expected_tag}." >&2
            exit 1
          fi

          if npm view "yt-dlp-mcp-server@${package_version}" version >/dev/null 2>&1; then
            echo "yt-dlp-mcp-server@${package_version} is already published on npm." >&2
            exit 1
          fi

      - name: Pack npm tarball
        working-directory: yt-dlp-mcp-server
        run: |
          mkdir -p .release
          pnpm pack --pack-destination .release
          ls -lh .release/*.tgz

      - name: Attest npm tarball
        uses: actions/attest@v4
        with:
          subject-path: yt-dlp-mcp-server/.release/*.tgz

      - name: Publish to npm
        working-directory: yt-dlp-mcp-server
        run: npm publish .release/*.tgz --access public
