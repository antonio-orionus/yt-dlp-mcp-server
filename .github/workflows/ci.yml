name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main

jobs:
  mcp-cross-platform:
    name: mcp ${{ matrix.os }} node-${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2025-vs2026]
        node: [20, 22, 24]
    steps:
      - name: Checkout MCP server
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.34.1 --activate

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate package
        run: pnpm run validate:ci

  release-gate:
    name: release gate ubuntu node-24 docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MCP server
        uses: actions/checkout@v6
        with:
          path: yt-dlp-mcp-server

      - name: Checkout bridge
        uses: actions/checkout@v6
        with:
          repository: antonio-orionus/yt-dlp-bridge
          path: y/yt-dlp-bridge

      - name: Checkout ytdlp-errors
        uses: actions/checkout@v6
        with:
          repository: antonio-orionus/yt-dlp-errors
          path: y/ytdlp-errors

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.34.1 --activate

      - name: Install pinned yt-dlp for bridge drift check
        run: python -m pip install "yt-dlp==2026.03.17"

      - name: Bootstrap MCP validation runner
        working-directory: yt-dlp-mcp-server
        run: pnpm install --frozen-lockfile

      - name: Validate release gate
        working-directory: yt-dlp-mcp-server
        run: pnpm run validate:release
